<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" href="/static/images/screen.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Samrudh S Shetty — Backend developer and CS student specializing in Python, Flask, and AI-powered products. View projects, skills, and get in touch.{% endblock %}">
    <title>{% block title %}Samrudh S Shetty — Backend Developer & AI Builder{% endblock %}</title>
    <link rel="canonical" href="{% block canonical %}https://buildwithsamrudh.xyz/{% endblock %}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Samrudh S Shetty — Backend Developer & AI Builder{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Backend developer and CS student building AI-powered products with Python, Flask, and PostgreSQL.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://buildwithsamrudh.xyz/static/images/og-cover.png{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://buildwithsamrudh.xyz/{% endblock %}">
    <meta property="og:site_name" content="Samrudh Shetty Portfolio">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@samrudh_09">
    <meta name="twitter:title" content="{% block tw_title %}Samrudh S Shetty — Backend Developer{% endblock %}">
    <meta name="twitter:description" content="{% block tw_description %}Backend developer building AI-powered products with Python and Flask.{% endblock %}">
    <meta name="twitter:image" content="{% block tw_image %}https://buildwithsamrudh.xyz/static/images/og-cover.png{% endblock %}">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Samrudh S Shetty",
      "url": "https://buildwithsamrudh.xyz",
      "jobTitle": "Backend Developer & AI Builder",
      "description": "Final-year Computer and Communication Engineering student specializing in backend development and AI-powered product engineering.",
      "email": "samrudh20@outlook.com",
      "sameAs": [
        "https://github.com/samrudh9",
        "https://linkedin.com/in/samrudhsshetty",
        "https://x.com/samrudh_09"
      ],
      "knowsAbout": ["Python", "Java", "Flask", "Spring Boot", "PostgreSQL", "MySQL", "REST APIs", "Machine Learning", "NLP", "Docker", "SQLAlchemy", "Git"]
    }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_scripts %}{% endblock %}
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-logo">Samrudh</a>
        <div class="nav-links" id="navLinks">
            <a href="/about" class="{% if active_page == 'about' %}active{% endif %}">About</a>
            <a href="/skills" class="{% if active_page == 'skills' %}active{% endif %}">Tech Stack</a>
            <a href="/projects" class="{% if active_page == 'projects' %}active{% endif %}">Projects</a>
            <a href="/contact" class="{% if active_page == 'contact' %}active{% endif %}">Contact</a>
            <a href="https://drive.google.com/file/d/1UxqlwElKJU8_sAGN5yUxK-Ru3sOxZiUE/preview" target="_blank"
                rel="noopener noreferrer" class="nav-resume-btn">
                Resume
            </a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="nav-overlay" id="navOverlay"></div>

    <main class="main-content page-enter">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <span>Made on earth with</span>
            <img src="{{ url_for('static', filename='images/heart.png') }}" alt="heart icon" class="footer-heart-img">
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
